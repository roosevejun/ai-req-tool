server:
  port: 8080
  # Allow access from WSL/other network interfaces.
  address: 0.0.0.0

spring:
  application:
    name: docgen-agent-backend

agent:
  db:
    autoUpgrade:
      enabled: ${DB_AUTO_UPGRADE_ENABLED:true}
  storage:
    provider: ${STORAGE_PROVIDER:local}
    local:
      baseDir: ${STORAGE_LOCAL_BASE_DIR:./data/knowledge-assets}
    minio:
      endpoint: ${MINIO_ENDPOINT:}
      accessKey: ${MINIO_ACCESS_KEY:}
      secretKey: ${MINIO_SECRET_KEY:}
      bucket: ${MINIO_BUCKET:ai-req-tool-knowledge}
  auth:
    token:
      secret: ${AUTH_TOKEN_SECRET:change-me-in-prod}
      expireMinutes: ${AUTH_TOKEN_EXPIRE_MINUTES:720}
  template:
    # backend runtime dir -> g:\Agent root
    templateDir: ../..
    templateGlob: "01-PRD-*.md"
  llm:
    # If OPENAI_API_KEY is not configured, app can fallback to mock flow.
    openai:
      baseUrl: https://api.openai.com/v1
      model: gpt-4o-mini
      embeddingModel: text-embedding-3-small
      # Recommended: inject via env variable instead of hard-coding.
      apiKey: ${OPENAI_API_KEY:}
      timeoutMs: 30000
