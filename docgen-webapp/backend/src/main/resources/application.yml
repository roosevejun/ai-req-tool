server:
  port: 8080
  # Allow access from WSL/other network interfaces.
  address: 0.0.0.0

spring:
  application:
    name: docgen-agent-backend

agent:
  auth:
    token:
      secret: ${AGENT_AUTH_TOKEN_SECRET:change-me-in-prod}
      expireMinutes: ${AGENT_AUTH_TOKEN_EXPIRE_MINUTES:720}
  template:
    # backend runtime dir -> g:\Agent root
    templateDir: ../..
    templateGlob: "01-PRD-*.md"
  llm:
    # If OPENAI_API_KEY is not configured, app can fallback to mock flow.
    openai:
      baseUrl: https://api.openai.com/v1
      model: gpt-4o-mini
      # Recommended: inject via env variable instead of hard-coding.
      # Priority: AGENT_ROUTER_TOKEN -> OPENAI_API_KEY -> empty
      apiKey: ${AGENT_ROUTER_TOKEN:${OPENAI_API_KEY:}}
      timeoutMs: 30000
