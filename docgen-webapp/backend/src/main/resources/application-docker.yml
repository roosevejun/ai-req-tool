spring:
  datasource:
    druid:
      url: ${SPRING_DATASOURCE_DRUID_URL:jdbc:postgresql://postgres:5432/ai-req-tool}
      username: ${SPRING_DATASOURCE_DRUID_USERNAME:postgres}
      password: ${SPRING_DATASOURCE_DRUID_PASSWORD:postgres}
      driver-class-name: org.postgresql.Driver
      initial-size: 2
      min-idle: 2
      max-active: 20
      max-wait: 60000
      validation-query: SELECT 1
      test-while-idle: true
      test-on-borrow: false
      test-on-return: false

mybatis:
  mapper-locations: classpath*:mapper/**/*.xml
  type-aliases-package: com.tongtu.docgen
  configuration:
    map-underscore-to-camel-case: true
    jdbc-type-for-null: "NULL"

agent:
  db:
    autoUpgrade:
      enabled: ${DB_AUTO_UPGRADE_ENABLED:true}
  template:
    templateDir: /app/templates
    templateGlob: "01-PRD-*.md"
  llm:
    openai:
      baseUrl: ${OPENAI_BASE_URL:https://api.openai.com/v1}
      model: ${OPENAI_MODEL:gpt-4o-mini}
      apiKey: ${OPENAI_API_KEY:}
      timeoutMs: ${OPENAI_TIMEOUT_MS:30000}
