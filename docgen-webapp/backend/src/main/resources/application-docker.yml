spring:
  datasource:
    druid:
      url: ${SPRING_DATASOURCE_DRUID_URL:jdbc:postgresql://postgres:5432/ai-req-tool}
      username: ${SPRING_DATASOURCE_DRUID_USERNAME:postgres}
      password: ${SPRING_DATASOURCE_DRUID_PASSWORD:postgres}
      driver-class-name: org.postgresql.Driver
      initial-size: 2
      min-idle: 2
      max-active: 20
      max-wait: 60000
      validation-query: SELECT 1
      test-while-idle: true
      test-on-borrow: false
      test-on-return: false

mybatis:
  mapper-locations: classpath*:mapper/**/*.xml
  type-aliases-package: com.tongtu.docgen
  configuration:
    map-underscore-to-camel-case: true
    jdbc-type-for-null: "NULL"

agent:
  template:
    templateDir: /app/templates
    templateGlob: "01-PRD-*.md"
