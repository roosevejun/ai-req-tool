services:
  minio:
    image: minio/minio:RELEASE.2025-02-28T09-55-16Z
    container_name: ai-req-tool-minio
    restart: unless-stopped
    environment:
      MINIO_ROOT_USER: ${MINIO_ROOT_USER:-minioadmin}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD:-minioadmin123}
    command: server /data --console-address ":9001"
    ports:
      - "${MINIO_API_PORT:-9000}:9000"
      - "${MINIO_CONSOLE_PORT:-9001}:9001"
    volumes:
      - minio-data:/data

  backend:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: ai-req-tool-backend
    restart: unless-stopped
    environment:
      SPRING_PROFILES_ACTIVE: docker
      SPRING_DATASOURCE_DRUID_URL: jdbc:postgresql://${DB_HOST:-192.168.20.201}:${DB_PORT:-5432}/${DB_NAME:-ai-req-tool}
      SPRING_DATASOURCE_DRUID_USERNAME: ${DB_USER:-postgres}
      SPRING_DATASOURCE_DRUID_PASSWORD: ${DB_PASSWORD:-Hn3RAV8U64}
      OPENAI_BASE_URL: ${OPENAI_BASE_URL:-https://aigc.x-see.cn/v1}
      OPENAI_MODEL: ${OPENAI_MODEL:-gpt-3.5-turbo}
      OPENAI_TIMEOUT_MS: ${OPENAI_TIMEOUT_MS:-30000}
      OPENAI_API_KEY: ${OPENAI_API_KEY:-sk-y1KyU7GbpFkNFEvXzA8BnVwVNkxJvW99ud3ETOP9ccNfqcyU}
      AUTH_TOKEN_SECRET: ${AUTH_TOKEN_SECRET:-change-me-in-prod}
      STORAGE_PROVIDER: ${STORAGE_PROVIDER:-minio}
      STORAGE_LOCAL_BASE_DIR: ${STORAGE_LOCAL_BASE_DIR:-/app/data/knowledge-assets}
      MINIO_ENDPOINT: ${MINIO_ENDPOINT:-https://minio.ahncgl.cn}
      MINIO_ACCESS_KEY: ${MINIO_ACCESS_KEY:-admin}
      MINIO_SECRET_KEY: ${MINIO_SECRET_KEY:-Hn3RAV8U64}
      MINIO_BUCKET: ${MINIO_BUCKET:-ai-req-tool-knowledge}
    ports:
      - "${BACKEND_PORT:-8080}:8080"
    volumes:
      - ../templates:/app/templates:ro
      - backend-knowledge-data:/app/data
    depends_on:
      - minio

volumes:
  minio-data:
  backend-knowledge-data:
