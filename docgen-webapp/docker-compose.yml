services:
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: ai-req-tool-backend
    restart: unless-stopped
    environment:
      SPRING_PROFILES_ACTIVE: docker
      SPRING_DATASOURCE_DRUID_URL: jdbc:postgresql://${DB_HOST:-192.168.20.201}:${DB_PORT:-5432}/${DB_NAME:-ai-req-tool}
      SPRING_DATASOURCE_DRUID_USERNAME: ${DB_USER:-postgres}
      SPRING_DATASOURCE_DRUID_PASSWORD: ${DB_PASSWORD:-postgres}
      AGENT_ROUTER_TOKEN: ${AGENT_ROUTER_TOKEN:-}
      OPENAI_API_KEY: ${OPENAI_API_KEY:-}
      AGENT_AUTH_TOKEN_SECRET: ${AGENT_AUTH_TOKEN_SECRET:-change-me-in-prod}
    ports:
      - "${BACKEND_PORT:-8080}:8080"
    volumes:
      - ./templates:/app/templates:ro

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: ai-req-tool-frontend
    restart: unless-stopped
    depends_on:
      - backend
    ports:
      - "${FRONTEND_PORT:-5173}:80"
