apiVersion: apps/v1
kind: Deployment
metadata:
  name: ai-req-tool-frontend
  namespace: ai-req-tool
  labels:
    app: ai-req-tool-frontend
spec:
  replicas: 1
  revisionHistoryLimit: 2
  selector:
    matchLabels:
      app: ai-req-tool-frontend
  template:
    metadata:
      labels:
        app: ai-req-tool-frontend
    spec:
      imagePullSecrets:
        - name: harbor-pull-secret
      containers:
        - name: ai-req-tool-frontend
          image: harbor.ahtongtu.cn/ai-req-tool/frontend:latest
          imagePullPolicy: Always
          env:
            - name: BACKEND_PROXY_PASS
              value: "http://ai-req-tool-backend.ai-req-tool.svc.cluster.local:8080"
          ports:
            - containerPort: 80
          readinessProbe:
            httpGet:
              path: /
              port: 80
            initialDelaySeconds: 5
            periodSeconds: 10
            timeoutSeconds: 2
            failureThreshold: 6
          livenessProbe:
            httpGet:
              path: /
              port: 80
            initialDelaySeconds: 20
            periodSeconds: 20
            timeoutSeconds: 2
            failureThreshold: 3
          resources:
            requests:
              cpu: 50m
              memory: 64Mi
            limits:
              cpu: 300m
              memory: 256Mi
---
apiVersion: v1
kind: Service
metadata:
  name: ai-req-tool-frontend
  namespace: ai-req-tool
spec:
  selector:
    app: ai-req-tool-frontend
  ports:
    - name: http
      port: 80
      targetPort: 80
      protocol: TCP
  type: ClusterIP

